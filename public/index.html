<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Earl" />
  <meta name="theme-color" content="#2A2938" />
  <title>Earl</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <script>
    (function () {
      var t = localStorage.getItem('earl-theme') || 'slate';
      document.documentElement.setAttribute('data-theme', t);
    }());
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── THEMES ─────────────────────────────────────────────────── */

    :root,
    :root[data-theme="slate"] {
      --bg-gradient-start: #6B6880;
      --bg-gradient-mid:   #52506B;
      --bg-gradient-end:   #2A2938;
      --bg-gradient-angle: 170deg;
      --bloom-color:       rgba(200,194,223,0.09);
      --orb-color:         200,194,223;
      --text-primary:      #EDE8F2;
      --text-mid:          rgba(237,232,242,0.65);
      --text-soft:         rgba(237,232,242,0.38);
      --border:            rgba(237,232,242,0.09);
      --card-bg:           rgba(36,35,50,0.95);
      --btn-bg:            rgba(255,255,255,0.05);
      --btn-border:        rgba(237,232,242,0.09);
      --input-bg:          rgba(255,255,255,0.06);
      --input-border:      rgba(200,194,223,0.22);
      --send-bg:           rgba(200,194,223,0.12);
      --send-border:       rgba(200,194,223,0.28);
      --send-active-bg:    #C8C2DF;
      --send-icon:         #C8C2DF;
      --send-icon-active:  #2A2938;
      --danger:            #E08888;
      --icon-gmail:        rgba(234,67,53,0.16);
      --icon-calendar:     rgba(100,149,237,0.16);
      --icon-ticktick:     rgba(80,200,120,0.16);
      --icon-earl:         rgba(200,194,223,0.14);
      --icon-warn:         rgba(255,200,80,0.16);
      --font-body:         'DM Sans', sans-serif;
      --font-display:      'DM Sans', sans-serif;
      --wordmark-tracking: 0.34em;
    }

    :root[data-theme="parchment"] {
      --bg-gradient-start: #F0EBE0;
      --bg-gradient-mid:   #E5DDD0;
      --bg-gradient-end:   #C8BFB0;
      --bg-gradient-angle: 160deg;
      --bloom-color:       rgba(180,160,130,0.12);
      --orb-color:         120,100,80;
      --text-primary:      #2A2520;
      --text-mid:          rgba(42,37,32,0.60);
      --text-soft:         rgba(42,37,32,0.35);
      --border:            rgba(42,37,32,0.10);
      --card-bg:           rgba(245,240,232,0.96);
      --btn-bg:            rgba(0,0,0,0.04);
      --btn-border:        rgba(42,37,32,0.10);
      --input-bg:          rgba(0,0,0,0.04);
      --input-border:      rgba(120,100,80,0.22);
      --send-bg:           rgba(120,100,80,0.10);
      --send-border:       rgba(120,100,80,0.25);
      --send-active-bg:    #7A6450;
      --send-icon:         #7A6450;
      --send-icon-active:  #F0EBE0;
      --danger:            #C05050;
      --icon-gmail:        rgba(234,67,53,0.12);
      --icon-calendar:     rgba(66,133,244,0.12);
      --icon-ticktick:     rgba(52,168,83,0.12);
      --icon-earl:         rgba(120,100,80,0.12);
      --icon-warn:         rgba(230,170,0,0.12);
      --font-body:         'DM Sans', sans-serif;
      --font-display:      'DM Sans', sans-serif;
      --wordmark-tracking: 0.34em;
    }

    :root[data-theme="noir"] {
      --bg-gradient-start: #1A1A1A;
      --bg-gradient-mid:   #111111;
      --bg-gradient-end:   #050505;
      --bg-gradient-angle: 180deg;
      --bloom-color:       rgba(255,255,255,0.04);
      --orb-color:         220,220,220;
      --text-primary:      #E8E8E8;
      --text-mid:          rgba(232,232,232,0.55);
      --text-soft:         rgba(232,232,232,0.30);
      --border:            rgba(255,255,255,0.07);
      --card-bg:           rgba(18,18,18,0.97);
      --btn-bg:            rgba(255,255,255,0.04);
      --btn-border:        rgba(255,255,255,0.07);
      --input-bg:          rgba(255,255,255,0.05);
      --input-border:      rgba(220,220,220,0.18);
      --send-bg:           rgba(220,220,220,0.08);
      --send-border:       rgba(220,220,220,0.18);
      --send-active-bg:    #D0D0D0;
      --send-icon:         #AAAAAA;
      --send-icon-active:  #0A0A0A;
      --danger:            #E06060;
      --icon-gmail:        rgba(234,67,53,0.14);
      --icon-calendar:     rgba(100,149,237,0.14);
      --icon-ticktick:     rgba(80,200,120,0.14);
      --icon-earl:         rgba(200,200,200,0.10);
      --icon-warn:         rgba(255,200,80,0.14);
      --font-body:         'DM Sans', sans-serif;
      --font-display:      'DM Sans', sans-serif;
      --wordmark-tracking: 0.38em;
    }

    :root[data-theme="dusk"] {
      --bg-gradient-start: #8B6A50;
      --bg-gradient-mid:   #6B4E3A;
      --bg-gradient-end:   #2E2018;
      --bg-gradient-angle: 165deg;
      --bloom-color:       rgba(220,170,100,0.10);
      --orb-color:         220,185,140;
      --text-primary:      #F2E8DC;
      --text-mid:          rgba(242,232,220,0.62);
      --text-soft:         rgba(242,232,220,0.36);
      --border:            rgba(242,232,220,0.09);
      --card-bg:           rgba(38,26,18,0.95);
      --btn-bg:            rgba(255,255,255,0.05);
      --btn-border:        rgba(242,232,220,0.09);
      --input-bg:          rgba(255,255,255,0.06);
      --input-border:      rgba(220,185,140,0.24);
      --send-bg:           rgba(220,185,140,0.10);
      --send-border:       rgba(220,185,140,0.26);
      --send-active-bg:    #DDB978;
      --send-icon:         #DDB978;
      --send-icon-active:  #2E2018;
      --danger:            #E08070;
      --icon-gmail:        rgba(234,67,53,0.16);
      --icon-calendar:     rgba(100,149,237,0.16);
      --icon-ticktick:     rgba(80,200,120,0.16);
      --icon-earl:         rgba(220,185,140,0.14);
      --icon-warn:         rgba(255,200,80,0.16);
      --font-body:         'DM Sans', sans-serif;
      --font-display:      'DM Sans', sans-serif;
      --wordmark-tracking: 0.34em;
    }

    :root[data-theme="sage"] {
      --bg-gradient-start: #4A6B58;
      --bg-gradient-mid:   #354D40;
      --bg-gradient-end:   #1A2820;
      --bg-gradient-angle: 168deg;
      --bloom-color:       rgba(140,200,160,0.09);
      --orb-color:         160,210,175;
      --text-primary:      #E8F2EC;
      --text-mid:          rgba(232,242,236,0.62);
      --text-soft:         rgba(232,242,236,0.36);
      --border:            rgba(232,242,236,0.09);
      --card-bg:           rgba(20,32,24,0.95);
      --btn-bg:            rgba(255,255,255,0.05);
      --btn-border:        rgba(232,242,236,0.09);
      --input-bg:          rgba(255,255,255,0.05);
      --input-border:      rgba(160,210,175,0.22);
      --send-bg:           rgba(160,210,175,0.10);
      --send-border:       rgba(160,210,175,0.26);
      --send-active-bg:    #90C8A0;
      --send-icon:         #90C8A0;
      --send-icon-active:  #1A2820;
      --danger:            #E08888;
      --icon-gmail:        rgba(234,67,53,0.16);
      --icon-calendar:     rgba(100,149,237,0.16);
      --icon-ticktick:     rgba(80,200,120,0.16);
      --icon-earl:         rgba(160,210,175,0.14);
      --icon-warn:         rgba(255,200,80,0.16);
      --font-body:         'DM Sans', sans-serif;
      --font-display:      'DM Sans', sans-serif;
      --wordmark-tracking: 0.34em;
    }

    /* ── RESET ──────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      background: var(--bg-gradient-end);
    }

    body {
      height: 100%;
      height: 100dvh;
      font-family: var(--font-body);
      color: var(--text-primary);
      background: linear-gradient(
        var(--bg-gradient-angle),
        var(--bg-gradient-start)  0%,
        var(--bg-gradient-mid)   50%,
        var(--bg-gradient-end)  100%
      );
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse 60% 50% at 50% 38%,
        var(--bloom-color) 0%,
        transparent 68%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ─────────────────────────────────────────────────── */

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */

    .header {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      padding-top: calc(20px + env(safe-area-inset-top));
    }

    .wordmark {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: var(--wordmark-tracking);
      text-transform: uppercase;
      color: var(--text-primary);
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── STAGE ──────────────────────────────────────────────────── */

    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 38px;
    }

    #orbCanvas {
      width: 300px;
      height: 300px;
      display: block;
    }

    .status-text {
      font-size: 1rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-mid);
      letter-spacing: 0.01em;
      text-align: center;
      max-width: 280px;
      min-height: 1.4em;
      transition: color 0.3s ease;
    }

    .app.processing .status-text {
      font-style: normal;
      color: var(--text-primary);
    }

    /* ── CONTROLS ───────────────────────────────────────────────── */

    .controls {
      flex: none;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: transform 0.15s ease, opacity 0.25s ease;
    }

    .ctrl-btn:active { transform: scale(0.93); }

    .ctrl-btn.cancel {
      width: 44px;
      height: 44px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      opacity: 0.42;
    }

    .ctrl-btn.cancel svg { stroke: var(--text-soft); transition: stroke 0.2s ease; }
    .ctrl-btn.cancel:active { border-color: var(--danger); opacity: 1; }
    .ctrl-btn.cancel:active svg { stroke: var(--danger); }

    .app.processing .ctrl-btn.cancel,
    .app.result .ctrl-btn.cancel { opacity: 1; }

    #textInput {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 22px;
      padding: 11px 18px;
      outline: none;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-primary);
      caret-color: var(--send-icon);
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
    }

    #textInput:focus { border-color: var(--send-border); }
    #textInput::placeholder { color: var(--text-soft); }

    .send-btn {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--send-bg);
      border: 1px solid var(--send-border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .send-btn:disabled { opacity: 0.25; cursor: default; }
    .send-btn svg * { stroke: var(--send-icon); transition: stroke 0.2s ease; }

    .send-btn:not(:disabled):active {
      background: var(--send-active-bg);
      border-color: var(--send-active-bg);
    }

    .send-btn:not(:disabled):active svg * { stroke: var(--send-icon-active); }

    /* ── RESULT CARD ────────────────────────────────────────────── */

    .result-card {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      min-height: 25vh;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 12px 24px calc(48px + env(safe-area-inset-bottom));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transform: translateY(110%);
      transition: transform 0.52s cubic-bezier(0.34, 1.48, 0.64, 1);
      cursor: pointer;
    }

    .result-card.visible { transform: translateY(0); }

    .card-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 14px;
    }

    .action-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .action-item {
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideUp 0.38s cubic-bezier(0.34, 1.48, 0.64, 1) both;
    }

    .action-icon {
      flex: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .action-icon.gmail    { background: var(--icon-gmail); }
    .action-icon.calendar { background: var(--icon-calendar); }
    .action-icon.ticktick { background: var(--icon-ticktick); }
    .action-icon.earl     { background: var(--icon-earl); }
    .action-icon.warn     { background: var(--icon-warn); }

    .action-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-primary);
    }

    .action-text span {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--text-soft);
    }

    /* ── MENU TOGGLE ────────────────────────────────────────── */

    .menu-toggle {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s ease, transform 0.15s ease;
      opacity: 0.5;
    }

    .menu-toggle:active { transform: scale(0.92); opacity: 1; }
    .menu-toggle svg line { stroke: var(--text-mid); }

    /* ── SIDE MENU ──────────────────────────────────────────── */

    .menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
    }

    .menu-overlay.open { pointer-events: auto; }

    .side-menu {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(290px, 85vw);
      z-index: 50;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.52s cubic-bezier(0.34, 1.48, 0.64, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .side-menu.open { transform: translateX(0); }

    .menu-header {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(22px + env(safe-area-inset-top)) 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .menu-title {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .menu-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease;
    }

    .menu-close:active { transform: scale(0.9); }
    .menu-close svg line { stroke: var(--text-soft); }

    .menu-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .menu-section {
      padding: 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .menu-section:last-child {
      border-bottom: none;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
    }

    .menu-section-label {
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 14px;
    }

    .connected-apps { display: flex; gap: 16px; }

    .connected-app {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .app-status-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .app-status-icon.gmail    { background: var(--icon-gmail); }
    .app-status-icon.calendar { background: var(--icon-calendar); }
    .app-status-icon.ticktick { background: var(--icon-ticktick); }

    .status-dot {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(128,128,128,0.4);
      border: 1.5px solid var(--card-bg);
    }

    .status-dot.connected { background: #50C878; }

    .app-name {
      font-size: 0.70rem;
      color: var(--text-soft);
    }

    .action-log { display: flex; flex-direction: column; gap: 12px; }

    .log-empty {
      font-size: 0.82rem;
      color: var(--text-soft);
      font-style: italic;
    }

    .log-item { display: flex; align-items: center; gap: 10px; }

    .log-icon {
      flex: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    .log-icon.gmail    { background: var(--icon-gmail); }
    .log-icon.calendar { background: var(--icon-calendar); }
    .log-icon.ticktick { background: var(--icon-ticktick); }
    .log-icon.earl     { background: var(--icon-earl); }
    .log-icon.warn     { background: var(--icon-warn); }

    .log-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
      font-size: 0.82rem;
      color: var(--text-primary);
    }

    .log-text span {
      font-size: 0.72rem;
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-time {
      flex: none;
      font-size: 0.70rem;
      color: var(--text-soft);
    }

    .theme-grid {
      display: flex;
      justify-content: space-between;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .swatch-circle {
      display: block;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      outline: 2.5px solid transparent;
      outline-offset: 2.5px;
      transition: outline-color 0.2s ease, transform 0.15s ease;
    }

    .swatch:active .swatch-circle { transform: scale(0.9); }
    .swatch.active .swatch-circle { outline-color: var(--text-primary); }

    .swatch-label {
      font-size: 0.66rem;
      color: var(--text-soft);
    }
  </style>
</head>
<body>

  <div id="app" class="app">

    <header class="header">
      <div class="wordmark">Earl</div>
      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <line x1="0" y1="1"  x2="18" y2="1"  stroke-width="1.8" stroke-linecap="round"/>
          <line x1="0" y1="7"  x2="18" y2="7"  stroke-width="1.8" stroke-linecap="round"/>
          <line x1="0" y1="13" x2="18" y2="13" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <main class="stage">
      <canvas id="orbCanvas" width="600" height="600"></canvas>
      <p class="status-text" id="statusText">Ready when you are.</p>
    </main>

    <div class="controls" id="controls">
      <button class="ctrl-btn cancel" id="cancelBtn" aria-label="Cancel">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="3" x2="13" y2="13" stroke-width="1.8"/>
          <line x1="13" y1="3" x2="3" y2="13" stroke-width="1.8"/>
        </svg>
      </button>

      <input type="text" id="textInput" placeholder="Ask Earl anything…"
             autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="send" />

      <button class="send-btn" id="sendBtn" aria-label="Send" type="button" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 13V3M4 7l4-4 4 4" stroke-width="1.5"/>
        </svg>
      </button>
    </div>

  </div><!-- #app -->

  <div class="menu-overlay" id="menuOverlay"></div>

  <div class="side-menu" id="sideMenu" aria-hidden="true">
    <div class="menu-header">
      <span class="menu-title">Settings</span>
      <button class="menu-close" id="menuClose" aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="3" x2="13" y2="13" stroke-width="1.7"/>
          <line x1="13" y1="3" x2="3" y2="13" stroke-width="1.7"/>
        </svg>
      </button>
    </div>

    <div class="menu-body">
      <div class="menu-section">
        <div class="menu-section-label">Connected</div>
        <div class="connected-apps">
          <div class="connected-app">
            <div class="app-status-icon gmail">✉️</div>
            <div class="status-dot connected"></div>
            <span class="app-name">Gmail</span>
          </div>
          <div class="connected-app">
            <div class="app-status-icon calendar">📅</div>
            <div class="status-dot connected"></div>
            <span class="app-name">Calendar</span>
          </div>
          <div class="connected-app">
            <div class="app-status-icon ticktick">✓</div>
            <div class="status-dot connected"></div>
            <span class="app-name">TickTick</span>
          </div>
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-section-label">Recent</div>
        <div class="action-log" id="actionLog"></div>
      </div>

      <div class="menu-section">
        <div class="menu-section-label">Appearance</div>
        <div class="theme-grid">
          <button class="swatch" data-theme="slate" aria-label="Slate">
            <span class="swatch-circle" style="background:#6B6880"></span>
            <span class="swatch-label">Slate</span>
          </button>
          <button class="swatch" data-theme="parchment" aria-label="Parchment">
            <span class="swatch-circle" style="background:#E8E2D5"></span>
            <span class="swatch-label">Parchment</span>
          </button>
          <button class="swatch" data-theme="noir" aria-label="Noir">
            <span class="swatch-circle" style="background:#111111"></span>
            <span class="swatch-label">Noir</span>
          </button>
          <button class="swatch" data-theme="dusk" aria-label="Dusk">
            <span class="swatch-circle" style="background:#8B6A50"></span>
            <span class="swatch-label">Dusk</span>
          </button>
          <button class="swatch" data-theme="sage" aria-label="Sage">
            <span class="swatch-circle" style="background:#4A6B58"></span>
            <span class="swatch-label">Sage</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="result-card" id="resultCard" role="status" aria-live="polite">
    <div class="card-handle"></div>
    <p class="card-label">Earl did</p>
    <ul class="action-list" id="actionList"></ul>
  </div>

  <script>
    /* ── STATE ──────────────────────────────────────────────────── */

    let appState = 'idle';
    const app        = document.getElementById('app');
    const statusEl   = document.getElementById('statusText');
    const cancelBtn  = document.getElementById('cancelBtn');
    const textInput  = document.getElementById('textInput');
    const sendBtn    = document.getElementById('sendBtn');
    const resultCard = document.getElementById('resultCard');
    const actionList = document.getElementById('actionList');

    function setState(s) {
      appState = s;
      app.className  = 'app' + (s !== 'idle' ? ' ' + s : '');
      if (s === 'idle')       statusEl.textContent = 'Ready when you are.';
      if (s === 'processing') statusEl.textContent = 'On it…';
      if (s === 'result')     statusEl.textContent = 'Done.';
    }

    /* ── ORB ────────────────────────────────────────────────────── */

    const canvas = document.getElementById('orbCanvas');
    const ctx    = canvas.getContext('2d');
    const CX = 300, CY = 300;

    const ORB_CONFIGS = {
      idle: {
        rings: 5,  baseR: 96,  gap: 24,
        amp: 30,   speed: 0.0016, ns: 2.4, lw: 2.2, alpha: 0.52
      },
      processing: {
        rings: 7,  baseR: 102, gap: 20,
        amp: 52,   speed: 0.0034, ns: 3.8, lw: 2.6, alpha: 0.86
      }
    };

    const cur = { rings: 5, baseR: 96, gap: 24, amp: 8, speed: 0.0006, ns: 1.0, lw: 1.2, alpha: 0.08 };

    const MAX_RINGS = 8;
    const ringPhase = Array.from({ length: MAX_RINGS }, (_, i) => i * 0.9 + Math.random() * 2.5);
    const ringDrift = Array.from({ length: MAX_RINGS }, () => (Math.random() - 0.5) * 0.0018);

    let energy     = 0;
    let sizeNoise  = 0;
    let sizeTarget = 0;
    let rotSpeed   = 0.00055;

    function getOrbColor() {
      return getComputedStyle(document.documentElement).getPropertyValue('--orb-color').trim();
    }

    function noise(a, t, ns, off) {
      return (
        Math.sin(a * 2.0 + t * 1.3 + off)       * 0.30 +
        Math.sin(a * 3.7 + t * 0.7 + off * 1.4) * 0.24 +
        Math.sin(a * 1.3 + t * 2.2 + off * 0.5) * 0.22 +
        Math.sin(a * 5.2 + t * 0.5 + off * 2.3) * 0.14 +
        Math.sin(a * 7.5 + t * 1.8 + off * 0.9) * 0.10
      ) * ns;
    }

    function lerp(a, b, f) { return a + (b - a) * f; }

    let animT = 0;
    let rotT  = 0;

    function drawFrame() {
      // Random energy spikes — occasional bursts of life
      if (Math.random() < 0.007) energy = Math.min(1, energy + 0.28 + Math.random() * 0.52);
      energy *= 0.960;

      // Slow random size drift — not breathing, just wandering
      if (Math.random() < 0.012) sizeTarget = (Math.random() - 0.5) * 20;
      sizeNoise  = lerp(sizeNoise, sizeTarget, 0.016);
      sizeTarget *= 0.993;

      const key    = (appState === 'result') ? 'idle' : appState;
      const target = ORB_CONFIGS[key] || ORB_CONFIGS.idle;
      const tAlpha = target.alpha + energy * 0.22;
      const F      = 0.044;

      cur.rings = lerp(cur.rings, target.rings, F);
      cur.baseR = lerp(cur.baseR, target.baseR + sizeNoise, F * 0.38);
      cur.gap   = lerp(cur.gap,   target.gap,   F);
      cur.amp   = lerp(cur.amp,   target.amp * (1 + energy * 1.4), F);
      cur.speed = lerp(cur.speed, target.speed * (1 + energy * 0.8), F);
      cur.ns    = lerp(cur.ns,    target.ns,    F);
      cur.lw    = lerp(cur.lw,    target.lw,    F);
      cur.alpha = lerp(cur.alpha, tAlpha,       F);

      // Rotation speed wanders — not constant
      const rotTarget = 0.00036 + Math.sin(animT * 0.28) * 0.00024 + energy * 0.0022;
      rotSpeed = lerp(rotSpeed, rotTarget, 0.022);
      rotT    += rotSpeed;
      animT   += cur.speed;

      // Each ring drifts its own phase independently
      for (let i = 0; i < MAX_RINGS; i++) {
        ringPhase[i] += ringDrift[i] + energy * 0.008 * (1 - i * 0.1);
      }

      ctx.clearRect(0, 0, 600, 600);
      const col   = getOrbColor();
      const rings = Math.round(cur.rings);

      for (let i = 0; i < rings; i++) {
        const r = cur.baseR + i * cur.gap;

        // Inner rings react stronger to energy spikes
        const iEnergy = energy * Math.max(0, 1 - i * 0.16);
        const amp     = cur.amp * (1 + iEnergy * 0.75);

        // Varying line width: inner thicker, outer thinner, with live wobble
        const lwBase = cur.lw * (1 + (rings - 1 - i) * 0.32);
        const lwWob  = Math.sin(animT * 2.3 + i * 1.8 + ringPhase[i]) * 0.42;
        const lw     = Math.max(0.4, lwBase + lwWob);

        // Each ring has its own slow alpha pulse, independent of others
        const pulse     = Math.sin(animT * 0.85 + i * 0.75 + ringPhase[i] * 0.55) * 0.11;
        const ringAlpha = Math.min(0.94, cur.alpha * (1 - i * 0.07) + pulse + iEnergy * 0.16);

        const off = i * 1.1 + ringPhase[i];

        ctx.beginPath();
        const PTS = 200;
        for (let j = 0; j <= PTS; j++) {
          const a  = (j / PTS) * Math.PI * 2 + rotT * (1 + i * 0.20);
          const pr = r + noise(a, animT, cur.ns, off) * amp;
          const x  = CX + Math.cos(a) * pr;
          const y  = CY + Math.sin(a) * pr;
          j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();

        if (i === 0) {
          const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, r + amp);
          g.addColorStop(0, `rgba(${col},${(ringAlpha * 0.24).toFixed(3)})`);
          g.addColorStop(1, `rgba(${col},0)`);
          ctx.fillStyle = g;
          ctx.fill();
        }

        ctx.strokeStyle = `rgba(${col},${ringAlpha.toFixed(3)})`;
        ctx.lineWidth   = lw;
        ctx.stroke();
      }

      requestAnimationFrame(drawFrame);
    }

    drawFrame();

    /* ── PROCESS ────────────────────────────────────────────────── */

    function demoActions(text) {
      const t = text.toLowerCase();
      if (t.includes('email') || t.includes('draft') || t.includes('send'))
        return [{ service: 'gmail',    label: 'Email drafted', detail: text.slice(0, 60) }];
      if (t.includes('remind') || t.includes('calendar') || t.includes('meeting'))
        return [{ service: 'calendar', label: 'Event created',  detail: text.slice(0, 60) }];
      if (t.includes('task') || t.includes('todo'))
        return [{ service: 'ticktick', label: 'Task added',     detail: text.slice(0, 60) }];
      return [{ service: 'earl', label: 'Noted', detail: text.slice(0, 60) }];
    }

    async function processTranscript(text) {
      setState('processing');
      try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 15000);
        const res  = await fetch('/api/earl', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ transcript: text }),
          signal:  ctrl.signal
        });
        clearTimeout(tid);
        if (!res.ok) throw new Error('not ok');
        const data = await res.json();
        showResult(data.actions || demoActions(text));
      } catch (_) {
        await new Promise(r => setTimeout(r, 700));
        showResult(demoActions(text));
      }
    }

    /* ── RESULT CARD ────────────────────────────────────────────── */

    const ICON_MAP = {
      gmail:    { e: '✉️', c: 'gmail' },
      calendar: { e: '📅', c: 'calendar' },
      ticktick: { e: '✓',       c: 'ticktick' },
      earl:     { e: '◆',       c: 'earl' },
      warn:     { e: '⚠',       c: 'warn' },
    };

    let dismissTimer = null;

    function showResult(actions) {
      setState('result');
      actionList.innerHTML = '';

      actions.forEach((action, i) => {
        logAction(action);
        const icon = ICON_MAP[action.service] || ICON_MAP.earl;
        const li   = document.createElement('li');
        li.className = 'action-item';
        li.style.animationDelay = (i * 70) + 'ms';

        const iconEl = document.createElement('div');
        iconEl.className = 'action-icon ' + icon.c;
        iconEl.textContent = icon.e;

        const textEl = document.createElement('div');
        textEl.className = 'action-text';
        textEl.textContent = action.label;

        const sub = document.createElement('span');
        sub.textContent = action.detail;
        textEl.appendChild(sub);

        li.appendChild(iconEl);
        li.appendChild(textEl);
        actionList.appendChild(li);
      });

      resultCard.classList.add('visible');
      clearTimeout(dismissTimer);
      dismissTimer = setTimeout(dismissCard, 6500);
    }

    function dismissCard() {
      clearTimeout(dismissTimer);
      resultCard.classList.remove('visible');
      setTimeout(() => setState('idle'), 450);
    }

    resultCard.addEventListener('click', dismissCard);

    /* ── CANCEL ─────────────────────────────────────────────────── */

    cancelBtn.addEventListener('click', () => {
      if (textInput.value.trim()) {
        textInput.value = '';
        sendBtn.disabled = true;
        return;
      }
      if (appState === 'result') {
        dismissCard();
      } else {
        setState('idle');
      }
    });

    /* ── TEXT INPUT ─────────────────────────────────────────────── */

    function sendTextInput() {
      const text = textInput.value.trim();
      if (!text || appState === 'processing') return;
      textInput.value = '';
      sendBtn.disabled = true;
      processTranscript(text);
    }

    sendBtn.addEventListener('click', sendTextInput);

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendTextInput();
    });

    textInput.addEventListener('input', () => {
      sendBtn.disabled = !textInput.value.trim();
    });

    /* ── MENU ──────────────────────────────────────────────────── */

    const menuToggle  = document.getElementById('menuToggle');
    const menuClose   = document.getElementById('menuClose');
    const menuOverlay = document.getElementById('menuOverlay');
    const sideMenu    = document.getElementById('sideMenu');
    const actionLog   = document.getElementById('actionLog');

    function openMenu() {
      renderLog();
      sideMenu.classList.add('open');
      menuOverlay.classList.add('open');
      sideMenu.setAttribute('aria-hidden', 'false');
    }

    function closeMenu() {
      sideMenu.classList.remove('open');
      menuOverlay.classList.remove('open');
      sideMenu.setAttribute('aria-hidden', 'true');
    }

    menuToggle.addEventListener('click', openMenu);
    menuClose.addEventListener('click',  closeMenu);
    menuOverlay.addEventListener('click', closeMenu);

    let swipeStartX = null;
    sideMenu.addEventListener('touchstart', (e) => {
      swipeStartX = e.touches[0].clientX;
    }, { passive: true });
    sideMenu.addEventListener('touchend', (e) => {
      if (swipeStartX === null) return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      swipeStartX = null;
      if (dx > 60) closeMenu();
    }, { passive: true });

    /* ── ACTION LOG ─────────────────────────────────────────────── */

    function logAction(action) {
      const log = JSON.parse(localStorage.getItem('earl-log') || '[]');
      log.unshift({
        label:   action.label,
        detail:  action.detail,
        service: action.service,
        time:    new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
      });
      localStorage.setItem('earl-log', JSON.stringify(log.slice(0, 5)));
    }

    function renderLog() {
      const log = JSON.parse(localStorage.getItem('earl-log') || '[]');
      if (!log.length) {
        actionLog.innerHTML = '<p class="log-empty">No actions yet.</p>';
        return;
      }
      actionLog.innerHTML = log.map(entry => {
        const icon = ICON_MAP[entry.service] || ICON_MAP.earl;
        return `<div class="log-item">
          <div class="log-icon ${icon.c}">${icon.e}</div>
          <div class="log-text">${entry.label}<span>${entry.detail}</span></div>
          <div class="log-time">${entry.time}</div>
        </div>`;
      }).join('');
    }

    /* ── THEME SWATCHES ─────────────────────────────────────────── */

    function markActiveSwatch(theme) {
      document.querySelectorAll('.swatch').forEach(b =>
        b.classList.toggle('active', b.dataset.theme === theme)
      );
    }

    document.querySelectorAll('.swatch').forEach(btn => {
      btn.addEventListener('click', () => {
        const theme = btn.dataset.theme;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('earl-theme', theme);
        markActiveSwatch(theme);
      });
    });

    /* ── INIT ───────────────────────────────────────────────────── */

    markActiveSwatch(localStorage.getItem('earl-theme') || 'slate');
    textInput.focus();

    /* ── SERVICE WORKER ─────────────────────────────────────────── */

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
